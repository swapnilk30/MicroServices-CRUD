spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:7071
              predicates:
                - Path=/users/**
            - id: order-service
            #uri: lb://order-service
              uri: http://localhost:7070
              predicates:
                - Path=/orders/**


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG